<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Pane</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #fff; }
        table { width: 100%; max-width: 400px; margin: 20px auto; border-collapse: collapse; }
        td { padding: 10px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #2c3e50; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; }
        button:hover { background: #34495e; }
        h3 { text-align: center; color: #2c3e50; }
    </style>
</head>
<body>
    <h3>Secure Account Login</h3>
    <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Login submitted!');">
        <table>
            <tr>
                <td><label for="uid">Username:</label></td>
                <td><input type="text" id="uid" name="username" required></td>
            </tr>
            <tr>
                <td><label for="pass">Password:</label></td>
                <td><input type="password" id="pass" name="password" required></td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <button type="submit">Sign In</button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
